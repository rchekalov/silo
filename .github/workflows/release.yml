name: Release

on:
  push:
    tags:
      - "v*"

# Needed so the GITHUB_TOKEN used by softprops/action-gh-release can
# create a release on this repo.
permissions:
  contents: write

jobs:
  verify:
    name: Verify build
    runs-on: macos-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Select latest Xcode (for Swift 6.2+)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build + test
        run: |
          make bridge
          make test

      - name: Build release bundle with baked version
        run: |
          STAGE="${RUNNER_TEMP}/silo-install"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"
          make release-bundle PREFIX="$STAGE" VERSION=${{ steps.meta.outputs.version }}

      - name: Confirm --version matches tag
        run: |
          VERSION_OUT=$("$STAGE/bin/silo" --version)
          echo "silo reports: $VERSION_OUT"
          echo "$VERSION_OUT" | grep -q "${{ steps.meta.outputs.version }}" \
            || (echo "version mismatch"; exit 1)

      # Package the signed binary + dylib into a tarball that the Homebrew
      # formula downloads directly. This eliminates ~3.5 GB of build-time
      # deps (go, swift, and swift's transitive python/openssl/etc.) on the
      # user side — `brew install` becomes a download+extract.
      - name: Package prebuilt tarball
        run: |
          set -euo pipefail
          mkdir -p dist
          make release-tarball \
            PREFIX="$STAGE" \
            VERSION=${{ steps.meta.outputs.version }} \
            OUT_DIR=dist
          ls -la dist

      - name: Upload prebuilt tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: silo-prebuilt-arm64
          path: dist/
          retention-days: 1

      # Build the prebuilt runtime bundle (vmlinux + initfs.ext4) so users who
      # install silo via Homebrew don't have to cross-compile vminitd on their
      # own machines. The hidden `bootstrap-runtime` subcommand runs the same
      # bootstrap path used on a cold user install, but skips OCI pulls and
      # VM boot — the bundle only needs the two files we tar up below.
      - name: Build runtime bundle
        run: |
          set -euo pipefail
          "$STAGE/bin/silo" bootstrap-runtime
          mkdir -p runtime-dist
          tar -czf runtime-dist/silo-runtime-arm64.tar.gz \
            -C "$HOME/.silo" vmlinux initfs.ext4
          ( cd runtime-dist && shasum -a 256 silo-runtime-arm64.tar.gz > silo-runtime-arm64.tar.gz.sha256 )
          ls -la runtime-dist

      - name: Upload runtime bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: silo-runtime-arm64
          path: runtime-dist/
          retention-days: 1

  publish-release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}

    steps:
      - name: Download prebuilt tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: silo-prebuilt-arm64
          path: dist

      - name: Download runtime bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: silo-runtime-arm64
          path: runtime-dist

      # Read the sha256 produced by `make release-tarball` on macOS. Avoids a
      # second hash + avoids the retry loop the old source-tarball flow needed
      # against GitHub's lazy archive generation.
      - name: Read prebuilt tarball sha256
        id: sha
        run: |
          set -euo pipefail
          VERSION="${{ needs.verify.outputs.version }}"
          SHA=$(awk '{print $1}' "dist/silo-${VERSION}-macos-arm64.tar.gz.sha256")
          if [ -z "$SHA" ]; then
            echo "error: empty sha256 — refusing to proceed"
            exit 1
          fi
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "prebuilt tarball sha256: $SHA"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Attach the prebuilt silo binary tarball (Homebrew downloads this)
          # and the prebuilt runtime so first `silo install` can skip
          # cross-compiling vminitd.
          files: |
            dist/silo-${{ needs.verify.outputs.version }}-macos-arm64.tar.gz
            dist/silo-${{ needs.verify.outputs.version }}-macos-arm64.tar.gz.sha256
            runtime-dist/silo-runtime-arm64.tar.gz
            runtime-dist/silo-runtime-arm64.tar.gz.sha256

  update-formula:
    name: Bump Homebrew formula
    needs: [verify, publish-release]
    runs-on: ubuntu-latest
    # Skip if the release is a pre-release tag (e.g. v0.4.0-rc1).
    if: ${{ !contains(github.ref_name, '-') }}

    steps:
      # Check out source (for the canonical formula at scripts/homebrew/silo.rb)
      # into ./source/, and the tap into ./tap/. The job overwrites the tap's
      # Formula/silo.rb with source's copy on every release, then seds the
      # release-specific version/url/sha256 in. This keeps the tap structurally
      # in sync with source — no drift when the formula shape changes.
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: rchekalov/homebrew-apps
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update formula
        working-directory: tap
        env:
          VERSION: ${{ needs.verify.outputs.version }}
          SHA256: ${{ needs.publish-release.outputs.sha256 }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SRC_FORMULA=../source/scripts/homebrew/silo.rb
          DST_FORMULA=Formula/silo.rb

          if [ ! -f "$SRC_FORMULA" ]; then
            echo "canonical formula not found at $SRC_FORMULA"
            exit 1
          fi

          NEW_URL="https://github.com/${REPO}/releases/download/v${VERSION}/silo-${VERSION}-macos-arm64.tar.gz"

          # Overwrite the tap's formula from the canonical source, then sed in
          # the real values. Replaces the old surgical 3-line approach which
          # silently left formula-shape drift when source changed.
          cp "$SRC_FORMULA" "$DST_FORMULA"
          sed -i "s|^  version \".*\"|  version \"${VERSION}\"|" "$DST_FORMULA"
          sed -i "s|^  url \".*\"|  url \"${NEW_URL}\"|"         "$DST_FORMULA"
          sed -i "s|^  sha256 \".*\"|  sha256 \"${SHA256}\"|"    "$DST_FORMULA"

      - name: Commit + push
        working-directory: tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "formula already at this version, nothing to commit"
            exit 0
          fi
          git add Formula/silo.rb
          git commit -m "silo ${{ needs.verify.outputs.version }}"
          git push
